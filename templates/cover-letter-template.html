<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter — {{COMPANY}}</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
  }

  /* === PAGE — single-page hard limit ===
     The max-height + overflow:hidden combo SILENTLY TRUNCATES content
     that doesn't fit on one page. This is intentional: a cover letter
     must be one page. The agent generating content (modes/cover-letter.md)
     is responsible for keeping paragraphs within ~250-350 words total.
     Task 9 end-to-end verification visually checks that nothing was cut. */
  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    max-height: 9.5in;
    overflow: hidden;
    margin: 0 auto;
    padding: 2px 0;
  }

  /* === HEADER (matches CV visual identity) === */
  .header { margin-bottom: 22px; }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 10.5px;
    line-height: 1.4;
    color: #555;
  }

  .contact-row a { color: #555; text-decoration: none; }
  .contact-row .separator { color: #ccc; }

  /* === LETTER META === */
  .letter-meta {
    margin-bottom: 18px;
    font-size: 11px;
    color: #555;
  }

  .letter-meta .recipient {
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
  }

  /* === SALUTATION === */
  .salutation {
    font-size: 11.5px;
    margin-bottom: 14px;
    color: #1a1a2e;
  }

  /* === BODY PARAGRAPHS === */
  .letter-body p {
    margin-bottom: 12px;
    text-align: left;
    color: #2f2f2f;
  }

  .letter-body p:last-child { margin-bottom: 16px; }

  /* === SIGN-OFF === */
  .sign-off {
    margin-top: 14px;
  }

  .sign-off .closing {
    margin-bottom: 18px;
    color: #1a1a2e;
  }

  .sign-off .signature-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  /* Links should not break across lines */
  a { white-space: nowrap; }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- LETTER META -->
  <div class="letter-meta">
    <div class="recipient">{{COMPANY}}</div>
    <div>{{ROLE}}</div>
    <div>{{DATE}}</div>
  </div>

  <!-- SALUTATION -->
  <div class="salutation">{{SALUTATION}}</div>

  <!-- BODY (4 paragraphs from JSON) -->
  <div class="letter-body">
    {{PARAGRAPHS_HTML}}
  </div>

  <!-- SIGN-OFF -->
  <div class="sign-off">
    <div class="closing">{{CLOSING}}</div>
    <div class="signature-name">{{NAME}}</div>
  </div>

</div>
</body>
</html>
