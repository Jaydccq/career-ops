# electron-builder config for the Career Ops desktop app.
#
# Personal-use, macOS-only, unsigned. See docs/CLIENT_APP.md for context.
# Distribution to other Macs would require an Apple Developer ID and
# notarization — explicitly out of scope.

appId: io.hongxi.career-ops
productName: Career Ops
copyright: Copyright (c) 2026 Hongxi Chen
directories:
  output: release
  buildResources: build

# Files included in app.asar (the bundled JS + workspace package sources).
# electron-builder follows the pnpm workspace symlinks under node_modules
# and pulls @career-ops/server + @career-ops/shared in automatically, so
# we don't need extraResources — but we do exclude tests and the dev
# bridge token to keep the bundle clean.
files:
  - "dist/**/*"
  - "src/settings-window.html"
  - "icons/**/*"
  - "package.json"
  - "!node_modules/@career-ops/*/.bridge-token"
  - "!node_modules/@career-ops/*/**/*.test.ts"
  - "!node_modules/@career-ops/*/**/*.test.js"
  - "!node_modules/@career-ops/*/vitest.config.ts"

mac:
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  icon: icons/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  notarize: false

# Windows / Linux out of scope for this stage.
win:
  target: []
linux:
  target: []
