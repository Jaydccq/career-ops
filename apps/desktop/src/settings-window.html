<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Career Ops — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    h1 { font-size: 18px; margin: 0 0 16px; }
    label { display: block; margin-top: 16px; font-size: 13px; font-weight: 500; }
    select, input[type="password"], input[type="text"] {
      display: block; width: 100%; padding: 8px;
      border: 1px solid #c7c7cc; border-radius: 6px;
      font-size: 13px; margin-top: 6px;
      background: white;
      box-sizing: border-box;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 13px; }
    .buttons { margin-top: 24px; display: flex; justify-content: flex-end; gap: 8px; }
    button {
      padding: 8px 16px; border-radius: 6px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .primary { background: #007aff; color: white; }
    .secondary { background: #e5e5ea; color: #1d1d1f; }
    .key-status { font-size: 12px; color: #6e6e73; margin-top: 4px; }
    .hidden { display: none; }
    .error { color: #c0392b; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <label for="backend">Evaluation backend</label>
  <select id="backend">
    <option value="real-codex">Codex CLI (default)</option>
    <option value="real-claude">Claude CLI</option>
    <option value="real-openrouter">OpenRouter API</option>
    <option value="fake">Fake (testing)</option>
  </select>

  <div id="openrouter-section" class="hidden">
    <label for="openrouter-key">OpenRouter API Key</label>
    <input id="openrouter-key" type="password" placeholder="sk-or-...">
    <div class="key-status" id="key-status">Not set</div>
  </div>

  <div class="checkbox-row">
    <input id="start-at-login" type="checkbox">
    <label for="start-at-login" style="margin: 0;">Start Career Ops at login</label>
  </div>

  <div class="error hidden" id="error"></div>

  <div class="buttons">
    <button class="secondary" id="cancel">Cancel</button>
    <button class="primary" id="save">Save &amp; Restart</button>
  </div>

  <script>
    (function () {
      const api = window.careerOpsSettings;
      if (!api) {
        document.body.innerHTML =
          "<p>Preload script not loaded — settings UI cannot communicate with the app. " +
          "Run <code>pnpm --filter @career-ops/desktop run build:preload</code> and relaunch.</p>";
        return;
      }

      const backendSel = document.getElementById("backend");
      const openrouterSection = document.getElementById("openrouter-section");
      const keyStatus = document.getElementById("key-status");
      const keyInput = document.getElementById("openrouter-key");
      const startAtLogin = document.getElementById("start-at-login");
      const saveBtn = document.getElementById("save");
      const cancelBtn = document.getElementById("cancel");
      const errEl = document.getElementById("error");

      function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.remove("hidden");
      }
      function clearError() {
        errEl.textContent = "";
        errEl.classList.add("hidden");
      }

      function toggleOpenRouterSection() {
        openrouterSection.classList.toggle("hidden", backendSel.value !== "real-openrouter");
      }

      api.load().then((state) => {
        backendSel.value = state.backend;
        startAtLogin.checked = !!state.startAtLogin;
        keyStatus.textContent = state.hasKey
          ? "Key is set (paste a new key to overwrite)"
          : "Not set";
        toggleOpenRouterSection();
      });

      backendSel.addEventListener("change", toggleOpenRouterSection);
      cancelBtn.addEventListener("click", () => api.close());

      saveBtn.addEventListener("click", async () => {
        clearError();
        saveBtn.disabled = true;
        const originalLabel = saveBtn.textContent;
        saveBtn.textContent = "Saving…";
        try {
          await api.save({
            backend: backendSel.value,
            startAtLogin: startAtLogin.checked,
            openrouterKey: keyInput.value.trim() || null,
          });
          api.close();
        } catch (err) {
          showError("Save failed: " + (err && err.message ? err.message : String(err)));
          saveBtn.disabled = false;
          saveBtn.textContent = originalLabel;
        }
      });
    })();
  </script>
</body>
</html>
